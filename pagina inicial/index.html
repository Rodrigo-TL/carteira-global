<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carteira Global</title>
    <link rel="stylesheet" href="arquivo.css">
</head>

<body>
    <main class="app-shell">
        <h1>Carteira Global</h1>

        <section id="cadastro-gasto" class="card">
            <h2>Adicionar Novo Gasto</h2>
            <form id="form-gasto" class="form-grid">
                <div class="field-group">
                    <label for="descricao">Descrição</label>
                    <input type="text" id="descricao" required placeholder="Ex: Mercado, assinatura...">
                </div>
                <div class="field-group">
                    <label for="valor-original">Valor</label>
                    <input type="number" id="valor-original" step="0.01" required placeholder="0.00">
                </div>
                <div class="field-group">
                    <label for="moeda-gasto">Moeda Original</label>
                    <select id="moeda-gasto" required>
                        <option value="BRL">Real (BRL)</option>
                        <option value="USD">Dólar (USD)</option>
                        <option value="EUR">Euro (EUR)</option>
                        <option value="BTC">Bitcoin (BTC)</option>
                    </select>
                </div>
                <button type="submit">Inserir Gasto</button>
            </form>
        </section>

        <section id="cotacao" class="card">
            <h2>Painel de Cotações</h2>
            <div class="cotacao-header">
                <div id="status-cotacao" class="status-cotacao" aria-live="polite">
                    <span class="spinner"></span>
                    <span>Buscando cotações...</span>
                </div>
                <button id="btn-atualizar-cotacoes" type="button" class="btn-atualizar">Atualizar</button>
            </div>

            <div class="moeda-grid">
                <div class="moeda">
                    <label for="valor-usd">USD</label>
                    <input id="valor-usd" class="valor-cotacao" value="Carregando..." readonly>
                </div>
                <div class="moeda">
                    <label for="valor-eur">EUR</label>
                    <input id="valor-eur" class="valor-cotacao" value="Carregando..." readonly>
                </div>
                <div class="moeda">
                    <label for="valor-btc">BTC</label>
                    <input id="valor-btc" class="valor-cotacao" value="Carregando..." readonly>
                </div>
            </div>

            <div class="summary-box">
                <label for="total">Total de gasto (R$)</label>
                <input type="number" id="total" step="0.01" placeholder="Digite o valor em R$">
            </div>

            <div class="converter-box">
                <p>Equivalente em:</p>
                <div class="button-grid">
                    <button type="button" onclick="dolar()">Dólar</button>
                    <button type="button" onclick="euro()">Euro</button>
                    <button type="button" onclick="bitcoin()">Bitcoin</button>
                </div>
                <p class="resultado-label">Resultado: <span id="resultado">—</span></p>
            </div>
        </section>
    </main>

    <script src="formulario.js"></script>
</body>

</html>
