<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carteira Global</title>
    <link rel="stylesheet" href="./arquivo.css">
</head>
<body style="background-color: antiquewhite;">
    <main>
        <h1>CARTEIRA GLOBAL</h1>
        <h2>Painel de Moedas</h2>

        <section id="cotacao">
            <div class="moeda">
                <p>USD: <input id="valor-usd"></input></p>
            </div>
            <div class="moeda">
                <p>EUR: <input id="valor-eur"></input></p>
            </div>
            <div class="moeda">
                <p>BTC: <input id="valor-btc"></input></p>
            </div>
            <br>
            <br>
            <div>
                <p>Total de gasto: 
                    <input type="number" id="total" placeholder="Digite o Valor em R$"></input></p>
            </div>
            
            <div> 
                <p>Equivalente em: </p>
                <button onclick="dolar()">DOLÁR</button> 
                <button onclick="euro()">EURO</button> 
                <button onclick="bitcoin()">BITCOIN</button> 
                <p>Resultado: <span id="resultado"></span></p>
            </div>

            <script src="formulario.js"></script>
        </section>

    </main>
</body>
</html>
