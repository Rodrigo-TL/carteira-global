<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carteira Global</title>
    <link rel="stylesheet" href="arquivo.css">

</head>

<body>
    <main>
        <h1>CARTEIRA GLOBAL</h1>
        <!-- INÍCIO DO SEU FORMULÁRIO DE GASTOS -->
        <section id="cadastro-gasto"
            style="margin-bottom: 30px; padding: 15px; border: 1px solid #ccc; border-radius: 5px;">
            <h2>Adicionar Novo Gasto</h2>
            <form id="form-gasto">
                <div style="margin-bottom: 10px;">
                    <label for="descricao">Descrição: </label>
                    <input type="text" id="descricao" required placeholder="Ex: Mercado, Assinatura...">
                </div>
                <div style="margin-bottom: 10px;">
                    <label for="valor-original">Valor: </label>
                    <input type="number" id="valor-original" step="0.01" required placeholder="0.00">
                </div>
                <div style="margin-bottom: 10px;">
                    <label for="moeda-gasto">Moeda Original: </label>
                    <select id="moeda-gasto" required>
                        <option value="BRL">Real (BRL)</option>
                        <option value="USD">Dólar (USD)</option>
                        <option value="EUR">Euro (EUR)</option>
                        <option value="BTC">Bitcoin (BTC)</option>
                    </select>
                </div>
                <button type="submit">Inserir Gasto</button>
            </form>
        </section>

        <!-- FIM DO FORMULÁRIO DE GASTOS -->

        <h2>Painel de Moedas</h2>


        <section id="cotacao">
            <div class="cotacao-header">
                <div id="status-cotacao" class="status-cotacao" aria-live="polite">
                    <span class="spinner"></span>
                    <span>Buscando cotações...</span>
                </div>
                <button id="btn-atualizar-cotacoes" type="button" class="btn-atualizar">Atualizar</button>
            </div>

            <div class="moeda">
                <p>USD: <input id="valor-usd" class="valor-cotacao" value="Carregando..." readonly></p>
            </div>

            <div class="moeda">
                <p>EUR: <input id="valor-eur" class="valor-cotacao" value="Carregando..." readonly></p>
            </div>
            <div class="moeda">
                <p>BTC: <input id="valor-btc" class="valor-cotacao" value="Carregando..." readonly></p>
            </div>

            <div>
                <p>Total de gasto:
                    <input type="number" id="total" placeholder="Digite o Valor em R$"></input>
                </p>
            </div>

            <div>
                <p>Equivalente em: </p>
                <button onclick="dolar()">DOLÁR</button>
                <br>
                <br>
                <button onclick="euro()">EURO</button>
                <br>
                <br>
                <button onclick="bitcoin()">BITCOIN</button>
                <p>Resultado: <span id="resultado"></span></p>
            </div>

            <script src="formulario.js"></script>
        </section>

    </main>
</body>

</html>
